# Music Taste Engine — default configuration.
# Override per-command with `--config path/to/override.yaml`.
# All paths are relative to the project root unless absolute.

project:
  name: music-taste-engine
  personal_use: true

paths:
  data: data
  audio: data/audio
  features: data/features
  indexes: data/indexes
  db: data/db/music.sqlite
  logs: logs

spotify:
  # Read-only scopes. user-top-read + user-read-recently-played feed the
  # automatic engagement weighting (see taste.engagement below).
  scopes:
    - user-library-read
    - playlist-read-private
    - user-top-read              # top tracks — taste affinity signal
    - user-read-recently-played  # recent plays — recency signal
  # Must exactly match a Redirect URI registered on the Spotify app.
  # Spotify requires a loopback IP (127.0.0.1), not "localhost".
  redirect_uri: "http://127.0.0.1:8080/callback"

acquisition:
  # Reject a yt-dlp match if its duration is off by more than this fraction.
  duration_tolerance: 0.10
  youtube:
    audio_format: m4a
    search_results: 5

# NOTE: taste_weight is deliberately NOT computed by a Phase-0 heuristic.
# `sync` records listening signals (top-track tier, recency, provenance) as
# observed data; how those translate into influence is owned by the taste
# model + feedback loop (Phase 2+), not a hand-tuned formula here.

logging:
  level: INFO
  json_file: true

extraction:
  # Sample rates — invariant 8: MERT 24kHz, CLAP 48kHz. Do not mix.
  target_sr_mert: 24000
  target_sr_clap: 48000
