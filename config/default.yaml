# Music Taste Engine — default configuration.
# Override per-command with `--config path/to/override.yaml`.
# All paths are relative to the project root unless absolute.

project:
  name: music-taste-engine
  personal_use: true

paths:
  data: data
  audio: data/audio
  features: data/features
  indexes: data/indexes
  db: data/db/music.sqlite
  logs: logs

spotify:
  # Read-only scopes. user-top-read + user-read-recently-played feed the
  # automatic engagement weighting (see taste.engagement below).
  scopes:
    - user-library-read
    - playlist-read-private
    - user-top-read              # top tracks — taste affinity signal
    - user-read-recently-played  # recent plays — recency signal
  # Must exactly match a Redirect URI registered on the Spotify app.
  # Spotify requires a loopback IP (127.0.0.1), not "localhost".
  redirect_uri: "http://127.0.0.1:8080/callback"

acquisition:
  # Reject a yt-dlp match if its duration is off by more than this fraction.
  duration_tolerance: 0.10
  download_workers: 8   # parallel yt-dlp fetches (downloading is network-bound)
  youtube:
    audio_format: m4a
    search_results: 5

# NOTE: taste_weight is deliberately NOT computed by a Phase-0 heuristic.
# `sync` records listening signals (top-track tier, recency, provenance) as
# observed data; how those translate into influence is owned by the taste
# model + feedback loop (Phase 2+), not a hand-tuned formula here.

taste:
  m2:                  # M2 aspect-weighted contrastive model
    epochs: 300        # InfoNCE optimisation steps
    lr: 0.05
    temperature: 0.1   # InfoNCE softmax temperature
  composite:           # `recommend --composite` blend weights
    mert_weight: 0.6
    clap_weight: 0.4
  m3:                  # M3 manifold model (VAE over liked embeddings)
    latent_dim: 16
    hidden: 256
    epochs: 400
    lr: 0.001
    beta: 0.001        # KL weight (beta-VAE — small, the data set is tiny)
  engagement:          # automatic taste_weight from silent listening signals
    prior_strength: 3.0  # pseudo-observations anchoring weight at 1.0 — a
                         # generic regulariser, NOT tuned to any one user

logging:
  level: INFO
  json_file: true

extraction:
  # Sample rates — invariant 8: MERT 24kHz, CLAP 48kHz. Do not mix.
  target_sr_mert: 24000
  target_sr_clap: 48000
  device: auto    # auto | cuda | cpu
  fp16: true      # mixed-precision inference on CUDA
  seed: 42        # determinism (invariant 7)
  decode_workers: 4   # threads decoding audio ahead of the GPU
  prefetch: 8         # decoded tracks kept buffered for the GPU
  mert:
    chunk_seconds: 5   # MERT was trained on ~5s clips; songs are chunked + pooled
    batch_size: 8      # ~1.5GB VRAM at fp16 (hardware notes)
  clap:
    chunk_seconds: 10  # CLAP windows; per-window embeddings are mean-pooled
    batch_size: 16
